<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人博客 - 一起写文章</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .blog-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .blog-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .blog-title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .blog-sub {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        .nav {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #f0f0f0;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: #e0e0e0;
            transform: scale(1.02);
        }

        .nav-btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .post-item {
            padding: 20px 0;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
        }

        .post-item:hover {
            padding-left: 8px;
            background: #fafafa;
            border-radius: 12px;
        }

        .post-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a2e;
        }

        .post-meta {
            font-size: 13px;
            color: #888;
            margin-bottom: 10px;
            display: flex;
            gap: 16px;
        }

        .post-excerpt {
            color: #555;
            font-size: 14px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 16px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 200px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .detail-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .detail-meta {
            color: #888;
            font-size: 14px;
            padding-bottom: 20px;
            margin-bottom: 24px;
            border-bottom: 1px solid #eee;
        }

        .detail-content {
            line-height: 1.8;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }

        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .settings-panel {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            body { padding: 20px 16px; }
            .card { padding: 20px; }
            .post-title { font-size: 18px; }
            .detail-title { font-size: 22px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- 设置面板（首次使用需要配置） -->
    <div id="setup-panel" class="card" style="display:none">
        <div class="blog-header">
            <div class="blog-icon">⚙️</div>
            <h2>首次使用配置</h2>
            <p style="color:#666; margin-top:8px;">需要配置一次，之后就不用再配了</p>
        </div>
        <div class="warning">
            📌 需要先完成 GitHub 配置（见教程），获取以下信息
        </div>
        <div class="form-group">
            <label>GitHub Token</label>
            <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div class="form-group">
            <label>仓库名（格式：用户名/仓库名）</label>
            <input type="text" id="repo-input" placeholder="你的用户名/blog-posts">
        </div>
        <button class="btn" onclick="saveConfig()">保存配置 →</button>
    </div>

    <!-- 首页 -->
    <div id="home-page" style="display:none">
        <div class="blog-header">
            <div class="blog-icon">👥</div>
            <h1 class="blog-title">多人博客</h1>
            <p class="blog-sub">和朋友一起写文章</p>
        </div>
        
        <div class="card">
            <div class="nav">
                <button class="nav-btn nav-btn-primary" onclick="showWrite()">✍️ 写文章</button>
                <button class="nav-btn" onclick="loadPosts()">🔄 刷新</button>
                <button class="nav-btn" onclick="clearConfig()">⚙️ 重置配置</button>
            </div>
        </div>

        <div class="card" id="posts-list">
            <div class="loading">加载文章中...</div>
        </div>
    </div>

    <!-- 写文章页 -->
    <div id="write-page" style="display:none">
        <div class="blog-header">
            <div class="blog-icon">✍️</div>
            <h1 class="blog-title">写新文章</h1>
        </div>
        <div class="card">
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="title" placeholder="文章标题">
            </div>
            <div class="form-group">
                <label>内容</label>
                <textarea id="content" placeholder="写下你的想法..."></textarea>
            </div>
            <button class="btn" onclick="createPost()">发布文章</button>
            <div style="text-align:center; margin-top:16px;">
                <button class="nav-btn" onclick="showHome()">← 返回</button>
            </div>
        </div>
    </div>

    <!-- 文章详情页 -->
    <div id="detail-page" style="display:none">
        <div class="card" id="post-detail">
            <div class="loading">加载中...</div>
        </div>
        <div style="text-align:center;">
            <a href="#" class="back-link" onclick="showHome(); return false;">← 返回首页</a>
        </div>
    </div>

</div>

<script>
    // ========== 配置管理 ==========
    function saveConfig() {
        const token = document.getElementById('token-input').value.trim();
        const repo = document.getElementById('repo-input').value.trim();
        
        if (!token || !repo) {
            alert('请填写完整信息');
            return;
        }
        
        localStorage.setItem('github_token', token);
        localStorage.setItem('github_repo', repo);
        
        alert('配置保存成功！');
        showHome();
        loadPosts();
    }
    
    function getConfig() {
        return {
            token: localStorage.getItem('github_token'),
            repo: localStorage.getItem('github_repo')
        };
    }
    
    function clearConfig() {
        localStorage.removeItem('github_token');
        localStorage.removeItem('github_repo');
        location.reload();
    }
    
    function checkConfig() {
        const config = getConfig();
        if (!config.token || !config.repo) {
            document.getElementById('setup-panel').style.display = 'block';
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('write-page').style.display = 'none';
            document.getElementById('detail-page').style.display = 'none';
            return false;
        }
        return true;
    }
    
    // ========== 页面切换 ==========
    function showHome() {
        document.getElementById('setup-panel').style.display = 'none';
        document.getElementById('home-page').style.display = 'block';
        document.getElementById('write-page').style.display = 'none';
        document.getElementById('detail-page').style.display = 'none';
        loadPosts();
    }
    
    function showWrite() {
        if (!checkConfig()) return;
        document.getElementById('home-page').style.display = 'none';
        document.getElementById('write-page').style.display = 'block';
        document.getElementById('detail-page').style.display = 'none';
        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
    }
    
    function showDetail(postId, postTitle, postBody, postDate) {
        if (!checkConfig()) return;
        document.getElementById('home-page').style.display = 'none';
        document.getElementById('write-page').style.display = 'none';
        document.getElementById('detail-page').style.display = 'block';
        
        document.getElementById('post-detail').innerHTML = `
            <h1 class="detail-title">${escapeHtml(postTitle)}</h1>
            <div class="detail-meta">📅 ${escapeHtml(postDate)}</div>
            <div class="detail-content">${escapeHtml(postBody).replace(/\n/g, '<br>')}</div>
        `;
    }
    
    // ========== GitHub API 操作 ==========
    async function githubRequest(method, url, body = null) {
        const config = getConfig();
        const response = await fetch(`https://api.github.com/repos/${config.repo}${url}`, {
            method: method,
            headers: {
                'Authorization': `token ${config.token}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: body ? JSON.stringify(body) : null
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.message || '请求失败');
        }
        return response.json();
    }
    
    // 获取所有文章（GitHub Issues）
    async function loadPosts() {
        const container = document.getElementById('posts-list');
        container.innerHTML = '<div class="loading">📡 加载文章中...</div>';
        
        if (!checkConfig()) return;
        
        try {
            const issues = await githubRequest('GET', '/issues?state=open&per_page=100');
            
            if (issues.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <h3>还没有文章</h3>
                        <p>点击「写文章」开始第一篇吧</p>
                    </div>
                `;
                return;
            }
            
            // 按创建时间倒序
            issues.reverse();
            
            let html = '';
            for (let issue of issues) {
                const body = issue.body || '';
                const preview = body.replace(/[#*`]/g, '').substring(0, 120) + (body.length > 120 ? '...' : '');
                
                html += `
                    <div class="post-item" onclick="showDetail('${issue.number}', '${escapeHtml(issue.title)}', '${escapeHtml(body)}', '${escapeHtml(issue.created_at.split('T')[0])}')">
                        <div class="post-title">${escapeHtml(issue.title)}</div>
                        <div class="post-meta">
                            <span>👤 ${escapeHtml(issue.user.login)}</span>
                            <span>📅 ${issue.created_at.split('T')[0]}</span>
                            <span>💬 ${issue.comments}</span>
                        </div>
                        <div class="post-excerpt">${escapeHtml(preview)}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        } catch (err) {
            console.error(err);
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <h3>加载失败</h3>
                    <p>${err.message}</p>
                    <p style="margin-top:12px; font-size:13px;">请检查 Token 和仓库名是否正确</p>
                </div>
            `;
        }
    }
    
    // 发布文章（创建 Issue）
    async function createPost() {
        const title = document.getElementById('title').value.trim();
        const content = document.getElementById('content').value.trim();
        
        if (!title || !content) {
            alert('请填写标题和内容');
            return;
        }
        
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = '发布中...';
        btn.disabled = true;
        
        try {
            await githubRequest('POST', '/issues', {
                title: title,
                body: content + `\n\n---\n*发布于: ${new Date().toLocaleString()}*`
            });
            alert('✅ 发布成功！所有人刷新后都能看到');
            showHome();
        } catch (err) {
            alert('发布失败：' + err.message);
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
    
    // 初始化
    if (getConfig().token && getConfig().repo) {
        showHome();
    } else {
        document.getElementById('setup-panel').style.display = 'block';
    }
</script>

</body>
</html>
